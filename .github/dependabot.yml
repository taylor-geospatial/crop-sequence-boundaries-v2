version: 2

updates:
  # Track Python runtime + dev dependencies declared in pyproject.toml.
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    groups:
      python-minor-patch:
        update-types:
          - minor
          - patch

  # Keep workflow actions current; pin-by-sha is preferred but tag floats
  # are acceptable for first-party actions in this repo.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch

  # Watch the runtime base image and any FROM lines in the Dockerfile.
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
    groups:
      docker-minor-patch:
        update-types:
          - minor
          - patch
