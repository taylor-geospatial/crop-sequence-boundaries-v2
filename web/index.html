<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CSB v1 vs v2 — Crop Sequence Boundaries</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"
    />
    <link
      rel="preconnect"
      href="https://data.source.coop"
      crossorigin
    />
    <link rel="preconnect" href="https://rsms.me" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <link
      rel="stylesheet"
      href="https://api.fontshare.com/v2/css?f[]=space-grotesk@500,600,700&display=swap"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <div class="brand">
        <span class="brand-mark">/csb</span>
        <span class="brand-title">Crop Sequence Boundaries — v1 / v2</span>
      </div>
      <div class="hud">
        <div class="legend">
          <button
            class="layer-toggle"
            data-layer="usda"
            data-color="#e89c2b"
            aria-pressed="true"
          >
            <span class="dot"></span>USDA v1 (2025)
          </button>
          <button
            class="layer-toggle"
            data-layer="ours"
            data-color="#3aa8ff"
            aria-pressed="true"
          >
            <span class="dot"></span>Ours v2 (2025)
          </button>
        </div>
        <div class="opacity-row">
          <label
            >v1 opacity
            <input
              type="range"
              id="usda-opacity"
              min="0"
              max="100"
              value="55"
            />
          </label>
          <label
            >v2 opacity
            <input
              type="range"
              id="ours-opacity"
              min="0"
              max="100"
              value="55"
            />
          </label>
        </div>
        <div class="quick-modes">
          <button data-mode="both" class="active">overlay</button>
          <button data-mode="usda">USDA only</button>
          <button data-mode="ours">v2 only</button>
        </div>
      </div>
      <a
        class="repo"
        href="https://github.com/isaaccorley/crop-sequence-boundaries-v2"
        target="_blank"
        rel="noopener"
        >github →</a
      >
    </header>

    <main id="map"></main>

    <footer>
      <span
        >Both archives served from
        <a
          href="https://source.coop/repositories/ftw/usda-csb"
          target="_blank"
          rel="noopener"
          >Source Cooperative · ftw/usda-csb</a
        ></span
      >
      <span class="kbd">↑↓ zoom &nbsp;·&nbsp; ⌘/ctrl + click drag = rotate</span>
    </footer>

    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/pmtiles@3.2.1/dist/pmtiles.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
